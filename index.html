<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Shield Pro X - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: 
        radial-gradient(ellipse at top left, rgba(20, 0, 60, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(80, 0, 120, 0.3) 0%, transparent 50%),
        linear-gradient(135deg, #000000 0%, #0a0a0f 20%, #0f0f1a 50%, #0a0a15 80%, #000000 100%);
    color: #e2e8f0;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* Ultra Dark Animated Background */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 15% 25%, rgba(88, 101, 242, 0.08) 0%, transparent 60%),
        radial-gradient(circle at 85% 75%, rgba(120, 69, 201, 0.06) 0%, transparent 60%),
        radial-gradient(circle at 35% 85%, rgba(14, 165, 115, 0.05) 0%, transparent 60%),
        radial-gradient(circle at 65% 15%, rgba(236, 72, 153, 0.04) 0%, transparent 60%);
    animation: bgFloat 30s ease-in-out infinite;
    z-index: -2;
}

body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(1px 1px at 20px 30px, rgba(88, 101, 242, 0.5), transparent),
        radial-gradient(1px 1px at 40px 70px, rgba(120, 69, 201, 0.4), transparent),
        radial-gradient(0.5px 0.5px at 90px 40px, rgba(14, 165, 115, 0.6), transparent);
    background-repeat: repeat;
    background-size: 150px 150px;
    animation: starField 25s linear infinite;
    z-index: -1;
}

@keyframes bgFloat {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.9; }
    33% { transform: scale(1.02) rotate(120deg); opacity: 0.7; }
    66% { transform: scale(1.04) rotate(240deg); opacity: 0.8; }
}

@keyframes starField {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(50px, -50px) rotate(360deg); }
}

/* Enhanced Dark Orbs */
.orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(45px);
    animation: orbFloat 20s ease-in-out infinite;
    z-index: -1;
}

.orb:nth-child(1) { 
    width: 220px; height: 220px; 
    top: 15%; left: 8%; 
    background: radial-gradient(circle, rgba(88, 101, 242, 0.25) 0%, transparent 70%);
}

.orb:nth-child(2) { 
    width: 160px; height: 160px; 
    bottom: 25%; right: 12%; 
    background: radial-gradient(circle, rgba(120, 69, 201, 0.22) 0%, transparent 70%);
    animation-delay: -6s;
}

.orb:nth-child(3) { 
    width: 130px; height: 130px; 
    top: 75%; left: 8%; 
    background: radial-gradient(circle, rgba(14, 165, 115, 0.2) 0%, transparent 70%);
    animation-delay: -12s;
}

.orb:nth-child(4) {
    width: 90px; height: 90px;
    top: 25%; right: 15%;
    background: radial-gradient(circle, rgba(236, 72, 153, 0.18) 0%, transparent 70%);
    animation-delay: -3s;
}

@keyframes orbFloat {
    0%, 100% { transform: translateY(0px) scale(1); opacity: 0.8; }
    50% { transform: translateY(-25px) scale(1.1); opacity: 0.6; }
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 90px 20px;
    position: relative;
    z-index: 10;
}

/* Premium Header */
.header {
    text-align: center;
    margin-bottom: 110px;
}

.logo {
    font-family: 'Orbitron', monospace;
    font-size: 4.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #8b5fcd 0%, #585cfa 35%, #ec4899 70%, #14b8a6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 24px;
    animation: logoGlow 2.8s ease-in-out infinite alternate;
    text-shadow: 0 0 30px rgba(88, 101, 242, 0.5);
}

@keyframes logoGlow {
    0% { 
        filter: drop-shadow(0 0 25px rgba(88, 101, 242, 0.6)) drop-shadow(0 0 50px rgba(120, 69, 201, 0.4)); 
    }
    100% { 
        filter: drop-shadow(0 0 45px rgba(88, 101, 242, 0.9)) drop-shadow(0 0 70px rgba(120, 69, 201, 0.7)); 
    }
}

.subtitle {
    font-size: 1.4rem;
    background: linear-gradient(135deg, #94a3b8 0%, #cbd5e1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 18px;
    letter-spacing: 2.5px;
    font-weight: 600;
    animation: subtitlePulse 4s ease-in-out infinite;
}

@keyframes subtitlePulse {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.02); }
}

.description {
    font-size: 1.15rem;
    color: #64748b;
    max-width: 620px;
    margin: 0 auto;
    line-height: 1.8;
    backdrop-filter: blur(15px);
}

/* Ultra Premium Cards */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 55px;
    margin-bottom: 90px;
}

.card {
    background: rgba(15, 15, 26, 0.85);
    backdrop-filter: blur(35px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 28px;
    padding: 52px;
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
    box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, #585cfa, #8b5fcd, #ec4899, #14b8a6, #585cfa);
    background-size: 300% 100%;
    animation: gradientShift 3s ease infinite;
}

.card::after {
    content: '';
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, rgba(88, 101, 242, 0.1) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(20px);
    animation: glowPulse 4s ease-in-out infinite;
}

@keyframes glowPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.3); opacity: 0.2; }
}

.card:hover {
    transform: translateY(-28px) rotateX(5deg) rotateY(-5deg) scale(1.025);
    box-shadow: 
        0 50px 100px rgba(88, 101, 242, 0.25),
        0 0 60px rgba(88, 101, 242, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    border-color: rgba(88, 101, 242, 0.3);
    background: rgba(15, 15, 26, 0.95);
}

.card-header {
    display: flex;
    align-items: center;
    margin-bottom: 35px;
    gap: 22px;
}

.card-icon {
    width: 75px;
    height: 75px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    position: relative;
    z-index: 2;
}

.card-icon.encrypt {
    background: linear-gradient(135deg, #585cfa, #6366f1);
}

.card-icon.decrypt {
    background: linear-gradient(135deg, #14b8a6, #0d9488);
}

.card h3 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.card p {
    color: #94a3b8;
    font-size: 1.02rem;
    line-height: 1.7;
    margin-bottom: 35px;
}

/* Premium Form Elements */
.input-wrapper {
    position: relative;
    margin-bottom: 30px;
}

.input-elite {
    width: 100%;
    padding: 22px 26px;
    background: rgba(20, 20, 35, 0.8);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 22px;
    color: #f1f5f9;
    font-size: 16px;
    transition: all 0.4s ease;
    backdrop-filter: blur(25px);
}

.input-elite::placeholder {
    color: #64748b;
}

.input-elite:focus {
    outline: none;
    border-color: #585cfa;
    box-shadow: 
        0 0 0 4px rgba(88, 101, 242, 0.2),
        0 0 40px rgba(88, 101, 242, 0.15);
    background: rgba(25, 25, 45, 0.9);
}

.file-upload-wrapper {
    position: relative;
    margin-bottom: 30px;
}

.file-upload-btn {
    width: 100%;
    padding: 22px 26px;
    background: linear-gradient(135deg, rgba(88, 101, 242, 0.15), rgba(88, 101, 242, 0.08));
    border: 2px solid rgba(88, 101, 242, 0.25);
    border-radius: 22px;
    color: #8b5fcd;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s ease;
    text-align: center;
    backdrop-filter: blur(25px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
}

.file-upload-btn:hover {
    background: linear-gradient(135deg, rgba(88, 101, 242, 0.25), rgba(88, 101, 242, 0.15));
    border-color: #585cfa;
    color: #f1f5f9;
    transform: translateY(-4px);
    box-shadow: 0 20px 45px rgba(88, 101, 242, 0.3);
}

.file-input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
}

/* Ultra Premium Buttons */
.btn-primary {
    width: 100%;
    padding: 24px 30px;
    background: linear-gradient(135deg, #585cfa 0%, #8b5fcd 50%, #ec4899 100%);
    border: none;
    border-radius: 22px;
    color: #ffffff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 
        0 20px 45px rgba(88, 101, 242, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(25px);
    position: relative;
    overflow: hidden;
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
}

.btn-primary:hover {
    transform: translateY(-7px) scale(1.02);
    box-shadow: 
        0 35px 70px rgba(88, 101, 242, 0.5),
        0 0 50px rgba(88, 101, 242, 0.3);
}

.btn-primary:active {
    transform: translateY(-3px);
}

.btn-secondary {
    width: 100%;
    padding: 24px 30px;
    background: linear-gradient(135deg, #14b8a6 0%, #0d9488 50%, #0f766e 100%);
    border: none;
    border-radius: 22px;
    color: #ffffff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    margin-top: 18px;
    box-shadow: 
        0 20px 45px rgba(20, 184, 166, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
}

.btn-secondary:hover {
    transform: translateY(-7px) scale(1.02);
    box-shadow: 
        0 35px 70px rgba(20, 184, 166, 0.5),
        0 0 50px rgba(20, 184, 166, 0.3);
}

/* Premium Results */
.results {
    max-width: 950px;
    margin: 0 auto;
}

.result-card {
    background: rgba(15, 15, 26, 0.9);
    backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 28px;
    padding: 60px;
    text-align: center;
    box-shadow: 
        0 40px 80px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    animation: fadeInUp 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(45px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.result-icon {
    width: 110px;
    height: 110px;
    margin: 0 auto 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    background: linear-gradient(135deg, #14b8a6, #0d9488);
}

.code-output {
    background: rgba(10, 10, 20, 0.95);
    border: 2px solid rgba(88, 101, 242, 0.3);
    border-radius: 20px;
    padding: 35px;
    margin: 35px 0;
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    word-break: break-all;
    max-height: 240px;
    overflow-y: auto;
    box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 15px 35px rgba(0, 0, 0, 0.6);
}

/* Enhanced Loading */
.loading {
    width: 55px;
    height: 55px;
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top: 4px solid #585cfa;
    border-radius: 50%;
    animation: spin 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
    margin: 0 auto 35px;
    position: relative;
}

.loading::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    border: 2px solid rgba(88, 101, 242, 0.2);
    border-radius: 50%;
    animation: spinReverse 1.8s linear infinite;
}

@keyframes spinReverse {
    0% { transform: rotate(360deg); }
    100% { transform: rotate(0deg); }
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Responsive */
@media (max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
        gap: 45px;
    }
    .logo {
        font-size: 3rem;
    }
    .container {
        padding: 70px 16px;
    }
    .card {
        padding: 45px 35px;
    }
}
</style>

<body>
    <!-- Enhanced Dark Orbs -->
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">File Shield Pro X</div>
            <div class="subtitle">PREMIUM ENCRYPTION</div>
            <p class="description">Secure your files with enterprise-grade encryption. Fast, beautiful, unbreakable.</p>
        </div>

        <!-- Cards -->
        <div class="grid">
            <!-- Encrypt Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon encrypt">
                        <i class="fas fa-lock"></i>
                    </div>
                    <h3>🔐 Encrypt File</h3>
                </div>
                <p>Upload any file to generate secure sharing code</p>
                
                <div class="file-upload-wrapper">
                    <label for="fileInput" class="file-upload-btn">
                        <i class="fas fa-cloud-upload-alt"></i>
                        Choose File
                    </label>
                    <input type="file" id="fileInput" class="file-input" accept="*/*">
                </div>
                
                <button class="btn-primary" onclick="uploadFile()">
                    <i class="fas fa-magic"></i> Generate Code
                </button>
            </div>

            <!-- Decrypt Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon decrypt">
                        <i class="fas fa-unlock"></i>
                    </div>
                    <h3>🔓 Decrypt File</h3>
                </div>
                <p>Paste code to access original file securely</p>
                
                <div class="input-wrapper">
                    <input type="text" class="input-elite" id="codeInput" placeholder="Enter encryption code...">
                </div>
                
                <button class="btn-primary" onclick="decodeFile()">
                    <i class="fas fa-key"></i> Access File
                </button>
            </div>
        </div>

        <!-- Results -->
        <div class="results" id="results"></div>
    </div>

    <script>
        // Upload file (same functionality, enhanced UI feedback)
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file first!');
                return;
            }

            document.getElementById('results').innerHTML = `
                <div class="result-card">
                    <div class="loading"></div>
                    <h3>🔐 Encrypting your file...</h3>
                    <p style="color: #94a3b8;">Generating ultra-secure sharing code</p>
                </div>
            `;

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/encode', {
                    method: 'POST',
                    body: formData
                });

                const code = await response.text();
                
                document.getElementById('results').innerHTML = `
                    <div class="result-card">
                        <div class="result-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <h3>✅ Code Generated Successfully!</h3>
                        <div class="code-output" id="codeOutput">${code}</div>
                        <button class="btn-secondary" onclick="copyCode()">📋 Copy Secure Code</button>
                    </div>
                `;
            } catch (error) {
                document.getElementById('results').innerHTML = `
                    <div class="result-card" style="border-color: #ef4444;">
                        <div class="result-icon" style="background: linear-gradient(135deg, #ef4444, #dc2626);">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <h3>❌ Encryption Failed</h3>
                        <p style="color: #f87171;">Please try again</p>
                    </div>
                `;
            }
        }

        function decodeFile() {
            const code = document.getElementById('codeInput').value.trim();
            
            if (!code) {
                alert('Please enter a code!');
                return;
            }

            document.getElementById('results').innerHTML = `
                <div class="result-card">
                    <div class="result-icon" style="background: linear-gradient(135deg, #14b8a6, #0d9488);">
                        <i class="fas fa-file-download"></i>
                    </div>
                    <h3>📁 File Ready!</h3>
                    <div style="display: flex; gap: 22px; justify-content: center; flex-wrap: wrap;">
                        <a href="/view/${encodeURIComponent(code)}" target="_blank" class="btn-secondary">
                            👁️ Preview
                        </a>
                        <a href="/decode/${encodeURIComponent(code)}" class="btn-primary" download>
                            ⬇️ Download
                        </a>
                    </div>
                </div>
            `;
        }

        function copyCode() {
            const code = document.getElementById('codeOutput').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = event.target;
                const original = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                btn.style.background = 'linear-gradient(135deg, #14b8a6, #0d9488)';
                setTimeout(() => {
                    btn.innerHTML = original;
                    btn.style.background = '';
                }, 1500);
            }).catch(() => {
                alert('Failed to copy');
            });
        }
    </script>
</body>
</html>
